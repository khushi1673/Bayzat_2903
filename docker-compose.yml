version: '3.8'

services:
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=ap-south-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=sqs_data
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sqs_data"]
      interval: 5s
      timeout: 5s
      retries: 5

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - SQS_ENDPOINT=http://localstack:4566
      - AWS_DEFAULT_REGION=ap-south-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test

  etl-tool:
    build: .
    depends_on:
      generator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - SQS_ENDPOINT=http://localstack:4566
      - SQS_QUEUE_NAME=test-queue
      - DB_HOST=postgres
      - DB_NAME=sqs_data
      - DB_USER=user
      - DB_PASSWORD=password
      - AWS_DEFAULT_REGION=ap-south-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
